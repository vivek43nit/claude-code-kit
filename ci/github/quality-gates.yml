# Quality Gates — copy to .github/workflows/quality-gates.yml in your project
#
# Gates enforced:
#   1. Secret scanning (Gitleaks)
#   2. Dependency vulnerability scan (Trivy)
#   3. Language-specific lint + type check
#   4. Tests with minimum 80% coverage

name: Quality Gates

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ── Detect languages ──────────────────────────────────────────────────────
  detect:
    name: Detect Languages
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.d.outputs.python }}
      typescript: ${{ steps.d.outputs.typescript }}
      javascript: ${{ steps.d.outputs.javascript }}
      go: ${{ steps.d.outputs.go }}
      java: ${{ steps.d.outputs.java }}
      kotlin: ${{ steps.d.outputs.kotlin }}
      rust: ${{ steps.d.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - id: d
        run: |
          py() { [ -f pyproject.toml ] || [ -f requirements.txt ] || find . -maxdepth 4 -name "*.py" | grep -q . ; }
          ts() { [ -f tsconfig.json ] || find . -maxdepth 4 -not -path "*/node_modules/*" -name "*.ts" | grep -q . ; }
          js() { [ -f package.json ] || find . -maxdepth 4 -not -path "*/node_modules/*" -name "*.js" | grep -q . ; }
          go_() { [ -f go.mod ] || find . -maxdepth 4 -name "*.go" | grep -q . ; }
          java() { [ -f pom.xml ] || [ -f build.gradle ] || find . -maxdepth 4 -name "*.java" | grep -q . ; }
          kt() { [ -f build.gradle.kts ] || find . -maxdepth 4 -name "*.kt" | grep -q . ; }
          rs() { [ -f Cargo.toml ] || find . -maxdepth 4 -name "*.rs" | grep -q . ; }

          echo "python=$(py && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "typescript=$(ts && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "javascript=$(! ts && js && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "go=$(go_ && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "java=$(java && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "kotlin=$(kt && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "rust=$(rs && echo true || echo false)" >> $GITHUB_OUTPUT

  # ── Security ──────────────────────────────────────────────────────────────
  security-secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for Gitleaks
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-deps:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: table

  # ── Python ────────────────────────────────────────────────────────────────
  lint-python:
    name: Python Lint + Typecheck
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy . --ignore-missing-imports

  test-python:
    name: Python Tests
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt pytest pytest-cov
      - run: pytest --cov --cov-fail-under=80 --cov-report=xml
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── TypeScript ────────────────────────────────────────────────────────────
  lint-typescript:
    name: TypeScript Lint + Typecheck
    needs: detect
    if: needs.detect.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint . --max-warnings 0

  test-typescript:
    name: TypeScript Tests
    needs: detect
    if: needs.detect.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx vitest run --coverage --coverage.thresholds.lines=80

  # ── Go ────────────────────────────────────────────────────────────────────
  lint-go:
    name: Go Lint
    needs: detect
    if: needs.detect.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test-go:
    name: Go Tests
    needs: detect
    if: needs.detect.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race -coverprofile=coverage.out ./...
      - run: go tool cover -func=coverage.out | awk '/total:/{if (substr($3, 1, length($3)-1) < 80) {print "Coverage below 80%: " $3; exit 1}}'
      - run: govulncheck ./...

  # ── Java ──────────────────────────────────────────────────────────────────
  test-java:
    name: Java Build + Test
    needs: detect
    if: needs.detect.outputs.java == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - run: mvn verify -B --no-transfer-progress
        # JaCoCo configured in pom.xml enforces 80% minimum

  # ── Rust ──────────────────────────────────────────────────────────────────
  lint-rust:
    name: Rust Clippy
    needs: detect
    if: needs.detect.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings

  test-rust:
    name: Rust Tests
    needs: detect
    if: needs.detect.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-tarpaulin
      - run: cargo audit
      - run: cargo tarpaulin --fail-under 80

  # ── Gate ──────────────────────────────────────────────────────────────────
  all-gates-pass:
    name: All Quality Gates
    if: always()
    needs:
      - security-secrets
      - security-deps
      - lint-python
      - test-python
      - lint-typescript
      - test-typescript
      - lint-go
      - test-go
      - test-java
      - lint-rust
      - test-rust
    runs-on: ubuntu-latest
    steps:
      - name: Check all gates
        run: |
          results='${{ toJson(needs) }}'
          echo "$results" | python3 -c "
          import sys, json
          needs = json.load(sys.stdin)
          failed = [k for k, v in needs.items() if v['result'] not in ('success', 'skipped')]
          if failed:
              print('FAILED:', ', '.join(failed))
              sys.exit(1)
          print('All gates passed')
          "
